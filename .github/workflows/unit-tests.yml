name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-unit:
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
